site_name: Hexo-Theme-Last

nav:
  - 主题介绍: index.md
  - 安装:
    - 下载: download.md
    - 升级: upgrade.md
  - 使用: 
    - 基本配置: config.md
    - 一些功能: functions.md

theme:
  language: zh
  name: material
  palette:
  - scheme: default
    toggle: 
      icon: material/lightbulb-outline
      name: Switch to dark mode
    primary: black  
  - scheme: slate
    toggle:
      icon: material/lightbulb
      name: Switch to light mode
    primary: black  
    # accent: light blue
  features:
    - navigation.expand
    - navigation.top
  logo: assets/images/favicon.png
extra:
  homepage: https://hexo-theme-last.github.io
markdown_extensions:
  - pymdownx.superfences
  - pymdownx.tabbed
